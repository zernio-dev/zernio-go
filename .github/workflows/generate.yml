name: Regenerate

on:
  repository_dispatch:
    types: [openapi-updated]
  workflow_dispatch:

jobs:
  generate:
    name: Regenerate from OpenAPI
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Java (for openapi-generator)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install OpenAPI Generator
        run: npm install -g @openapitools/openapi-generator-cli

      - name: Fetch latest OpenAPI spec
        run: |
          curl -f --retry 5 --retry-delay 2 --retry-all-errors --max-time 60 -o openapi.yaml https://zernio.com/openapi.yaml
          echo "Fetched OpenAPI spec"

      - name: Generate SDK
        run: |
          # Version is pinned in openapitools.json.
          # - structPrefix=true prefixes request structs by service, avoiding
          #   collisions where an operationId is reused across tags.
          # - name-mappings renames hasX properties whose sibling field "x"
          #   generates a colliding HasX() presence helper (hasReply vs reply,
          #   hasPhotos vs photos on GBP reviews). JSON tags stay camelCase.
          # Output into zernio/ so the import path stays
          # github.com/zernio-dev/zernio-go/zernio.
          openapi-generator-cli generate \
            -i openapi.yaml \
            -g go \
            -o zernio \
            --skip-validate-spec \
            --name-mappings hasReply=Replied,hasPhotos=PhotosPresent \
            --additional-properties=packageName=zernio,structPrefix=true \
            --git-user-id=zernio-dev \
            --git-repo-id=zernio-go
          # Generated test stubs are skip-only and the OAS 3.1 webhooks section
          # emits a WebhookEventsAPI test referencing an unwired service that
          # won't compile, so they are not shipped (see zernio/.openapi-generator-ignore).
          rm -rf zernio/test
          echo "Generated SDK"

      - name: Tidy modules
        run: go mod tidy

      - name: Format
        run: gofmt -w .

      - name: Build
        run: go build ./...

      - name: Run tests
        run: go test ./...

      - name: Generate README SDK Reference
        run: |
          pip install pyyaml --quiet
          python3 scripts/generate_readme_reference.py
          echo "README SDK Reference generation complete."

      - name: Check for changes
        id: changes
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Get current version
        if: steps.changes.outputs.has_changes == 'true'
        id: version
        run: |
          # Get latest tag or start at v0.1.0
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          # Bump patch version
          NEW_VERSION=$(echo $LATEST_TAG | awk -F. '{printf "v%d.%d.%d", $1, $2, $3+1}' | sed 's/vv/v/')
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: regenerate from OpenAPI spec

          - Auto-generated SDK updates
          - Version: ${{ steps.version.outputs.new_version }}"
          # Retry with rebase to survive concurrent dispatches that land
          # back-to-back pushes to main.
          for attempt in 1 2 3; do
            if git push; then break; fi
            echo "Push attempt $attempt failed; rebasing and retrying..."
            git pull --rebase origin main
            sleep $((attempt * 5))
          done

      - name: Create GitHub Release
        if: steps.changes.outputs.has_changes == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.new_version }}
          name: ${{ steps.version.outputs.new_version }}
          generate_release_notes: true
          body: |
            ## Auto-generated SDK Update

            This release was automatically generated from the latest OpenAPI spec.

            ```bash
            go get github.com/zernio-dev/zernio-go@${{ steps.version.outputs.new_version }}
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
